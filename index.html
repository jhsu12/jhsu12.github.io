<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>jhsu12 - Links</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="stylesheet" href="./index.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
        <script>
            window.addEventListener('DOMContentLoaded', () => {
                VANTA.BIRDS({
                el: "#vanta",
                mouseControls: true,
                touchControls: true,
                gyroControls: true,
                minHeight: 200.00,
                minWidth: 200.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color1: 0x1a2864,
                color2: 0x16404d,
                birdSize: 1.30,
                wingSpan: 15.00,
                speedLimit: 3.00,
                separation: 96.00,
                alignment: 9.00,
                cohesion: 9.00,
                quantity: 2.00,
                backgroundAlpha: 0.00
                })

                setTimeout(() => {
                    const main = document.querySelector('main')
                    main.style.opacity = 1
                    main.style.filter = "blur(0px)"
                }, 1000)
                
            })
            
        </script>

    </head>

    <body>
        <div id="vanta"></div>
        <main>
            <header>
                <img id="profile_pic" src="./images/jhsu12-1.png" />
                <h1>@jhsu12</h1>
            </header>
            <ul>
                <li>
                    <a href="https://www.linkedin.com/in/jason-hsu-12222as/">
                        <img src="./images/linkedin.svg" alt="Youtube" width="20" />
                        Linkedin
                    </a>
                </li>
                <li>
                    <a href="https://github.com/jhsu12">
                        <img src="./images/github.svg" alt="Github" width="20" />
                        Github
                    </a>
                </li>
                <li>
                    <a href="https://www.youtube.com/channel/UCvfE4ZUipUHwuw4cJei-RBw">
                        <img src="./images/youtube.svg" alt="Youtube" width="20" />
                        Youtube
                    </a>
                </li>
                
                
                <li>
                    <a href="https://medium.com/@jasonhsutsean">
                        <img src="./images/medium.svg" alt="Medium" width="20" />
                        Medium
                    </a>
                </li>
                
            </ul>

            <a style="margin-top: 50px;" href="./aeegi.html">
                <img src="./images/heart.svg" alt="Medium" width="30" />
            
            </a>
        </main>
        
    </body>
</html>
