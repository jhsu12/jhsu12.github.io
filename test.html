<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Timeline</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3dfe3; /* Romantic background color */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .timeline {
            position: relative;
            max-width: 800px;
            margin: 50px auto;
        }

        .timeline-item {
            position: relative;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            background-color: #fff;
        }

        .timeline-item img {
            width: 100%;
            max-width: 200px;
            border-radius: 4px;
            margin-right: 20px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background-color: #ccc;
        }

        .timeline-item:last-child::before {
            height: 50%; /* Adjust the height for the last item */
        }

        .timeline-item h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .timeline-item p {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="timeline">
    <div class="timeline-item">
        <img src="image1.jpg" alt="Event 1">
        <div>
            <h3>Event 1</h3>
            <p>Description for Event 1.</p>
        </div>
    </div>

    <div class="timeline-item">
        <img src="image2.jpg" alt="Event 2">
        <div>
            <h3>Event 2</h3>
            <p>Description for Event 2.</p>
        </div>
    </div>

    <div class="timeline-item">
        <img src="image3.jpg" alt="Event 3">
        <div>
            <h3>Event 3</h3>
            <p>Description for Event 3.</p>
        </div>
    </div>

    <!-- Add more timeline items as needed -->

</div>

</body>
</html>
