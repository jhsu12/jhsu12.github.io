<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3dfe3; /* Romantic background color */
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            position: relative;
            z-index: 1;
            
        }

        .letter {
            opacity: 1;
            overflow: hidden;
            white-space: pre-wrap;
            font-size: 18px;
            line-height: 1.6;
            color: #333; /* Text color */
           
        }

        .heart {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff6b6b; /* Heart color */
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: heartAnimation 3s infinite ease-out;
        }

        @keyframes heartAnimation {
            0% {
                transform: translateY(0) rotate(45deg);
            }
            50% {
                transform: translateY(-100px) rotate(45deg);
            }
            100% {
                transform: translateY(0) rotate(45deg);
            }
        }
        .beating-heart {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: beatHeart 1s infinite ease-in-out;
            z-index: 2; /* Place it above other elements */
        }
        @keyframes beatHeart {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }


        .img-container {
            display: flex;
            margin-top: 20px;
        }

        .image-transition {
            width: 50px; /* Set the width of your images */
            height: 50px; /* Set the height of your images */
            overflow: hidden;
        }

        .image-transition img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Maintain aspect ratio and cover container */
            transition: opacity 1s ease-in-out; /* Smooth transition effect */
        }

        .container {
            display: none;
           
        }

        .timeline-item {
            display: flex;
            position: relative;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            background-color: #fff;
        }

        .timeline-item img {
            width: 100%;
            max-width: 200px;
            border-radius: 4px;
            margin-right: 20px;
        }

        

        .timeline-item:last-child::before {
            height: 50%; /* Adjust the height for the last item */
        }

        .timeline-item h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .timeline-item h5 {
            margin-top: 0;
            margin-bottom: 5px;
        }

        .timeline-item p {
            margin: 0;
            font-size: 14px;
        }
        #audio-control {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px; /* Adjust padding for size */
            font-size: 18px; /* Adjust font size */
            background-color: #ff7eb9; /* Pink background */
            color: #fff; /* White text */
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>

            }
