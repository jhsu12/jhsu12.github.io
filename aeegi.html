<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3dfe3; /* Romantic background color */
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            position: relative;
            z-index: 1;
        }

        .letter {
            opacity: 1;
            overflow: hidden;
            white-space: pre-wrap;
            font-size: 18px;
            line-height: 1.6;
            color: #333; /* Text color */
           
        }

        .heart {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff6b6b; /* Heart color */
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: heartAnimation 3s infinite ease-out;
        }

        @keyframes heartAnimation {
            0% {
                transform: translateY(0) rotate(45deg);
            }
            50% {
                transform: translateY(-100px) rotate(45deg);
            }
            100% {
                transform: translateY(0) rotate(45deg);
            }
        }
        .beating-heart {
            display: flex;
            align-items: center;
            justify-content: center;
            animation: beatHeart 1s infinite ease-in-out;
            z-index: 2; /* Place it above other elements */
        }
        @keyframes beatHeart {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }


        .img-container {
            display: flex;
            margin-top: 20px;
        }

        .image-transition {
            width: 50px; /* Set the width of your images */
            height: 50px; /* Set the height of your images */
            overflow: hidden;
        }

        .image-transition img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Maintain aspect ratio and cover container */
            transition: opacity 1s ease-in-out; /* Smooth transition effect */
        }

        .timeline {
            display: none;
           
        }

        .timeline-item {
            display: flex;
            position: relative;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            background-color: #fff;
        }

        .timeline-item img {
            width: 100%;
            max-width: 200px;
            border-radius: 4px;
            margin-right: 20px;
        }

        

        .timeline-item:last-child::before {
            height: 50%; /* Adjust the height for the last item */
        }

        .timeline-item h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .timeline-item h5 {
            margin-top: 0;
            margin-bottom: 5px;
        }

        .timeline-item p {
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>

        // Function to reveal the timeline
        function revealTimeline() {
            timelineContainer.style.display = "block";
        }

        function typeLetterByLetter() {
            if (currentIndex < letterContent.length) {
                currentSentence = letterContent[currentIndex];
                letterContainer.innerHTML += currentSentence[currentLetterIndex];
                currentLetterIndex++;

                if (currentLetterIndex < currentSentence.length) {
                    setTimeout(typeLetterByLetter, 100); // Adjust typing speed (milliseconds)
                } else {
                    currentIndex++;
                    currentLetterIndex = 0;
                    letterContainer.innerHTML += "<br>"; // Add a line break after each sentence
                    setTimeout(typeLetterByLetter, 1000); // Pause between sentences
                }
            } else {
                revealTimeline();
            }

            // Change the opacity to 0
            image.style.opacity = 0;
            image1.style.opacity = 0;

                image1.src = newImagePath1;

        // Generate timeline items based on the events array
        events.forEach((event, index) => {
            const timelineItem = document.createElement("div");
            timelineItem.className = "timeline-item";

            const img = document.createElement("img");
            img.src = event.image;
            img.alt = event.title;

            const content = document.createElement("div");
            const title = document.createElement("h3");
            title.textContent = event.title;

            const description = document.createElement("p");
            description.textContent = event.description;


            const date = document.createElement("h5");
            date.className = "date";
            date.textContent = event.date;

            content.appendChild(title);
            content.appendChild(date);
            content.appendChild(description);

            timelineItem.appendChild(img);
            timelineItem.appendChild(content);

            timelineContainer.appendChild(timelineItem);

            // If it's the last item, adjust the height of the line
            if (index === events.length - 1) {
